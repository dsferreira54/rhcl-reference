---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhcl-console-plugin-patcher
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "15"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhcl-console-plugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "15"
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    resourceNames: ["cluster"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhcl-console-plugin-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "15"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhcl-console-plugin-patcher
subjects:
  - kind: ServiceAccount
    name: rhcl-console-plugin-patcher
    namespace: kuadrant-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rhcl-console-plugin-enable
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: rhcl-console-plugin-patcher
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              PLUGIN=kuadrant-console-plugin
              RESOURCE=consoles.operator.openshift.io/cluster

              if oc get "$RESOURCE" -o jsonpath='{.spec.plugins[*]}' | tr ' ' '\n' | grep -Fxq "$PLUGIN"; then
                echo "$PLUGIN is already enabled"
                exit 0
              fi

              if oc get "$RESOURCE" -o jsonpath='{.spec.plugins}' | grep -q '^\['; then
                oc patch "$RESOURCE" --type=json \
                  -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
              else
                oc patch "$RESOURCE" --type=merge \
                  -p="{\"spec\":{\"plugins\":[\"$PLUGIN\"]}}"
              fi

              echo "$PLUGIN enabled"
