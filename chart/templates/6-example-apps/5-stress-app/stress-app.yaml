    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>stress-app</title>
    <style>
      :root {
        --bg0:#080b12; --bg1:#0e1420; --bg2:#151d2e; --bg3:#1c273c;
        --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.14);
        --text:#edf2ff; --muted:#8fa3bf; --dim:#5c6f88;
        --accent:#5b8cff; --accent2:#7c5cff; --accent-glow:rgba(91,140,255,.25);
        --ok:#2fd67a; --ok-bg:rgba(47,214,122,.12);
        --warn:#ffb020; --warn-bg:rgba(255,176,32,.12);
        --err:#ff5c6c; --err-bg:rgba(255,92,108,.12);
        --radius:14px; --radius-sm:10px;
        --shadow:0 18px 50px rgba(0,0,0,.35);
      }
      * { box-sizing:border-box; }
      html { scroll-behavior:smooth; }
      body {
        margin:0; min-height:100vh; color:var(--text);
        font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(91,140,255,.18), transparent 55%),
          radial-gradient(900px 500px at 100% 0%, rgba(124,92,255,.14), transparent 50%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 40%, #0b1018);
      }
      .shell { max-width:1320px; margin:0 auto; padding:1.25rem 1.25rem 2.5rem; }
      .topbar {
        display:flex; align-items:center; justify-content:space-between; gap:1rem;
        padding:1rem 1.25rem; margin-bottom:1.25rem;
        background:rgba(21,29,46,.72); border:1px solid var(--border);
        border-radius:var(--radius); backdrop-filter:blur(12px); box-shadow:var(--shadow);
      }
      .brand { display:flex; align-items:center; gap:.9rem; min-width:0; }
      .brand-icon {
        width:42px; height:42px; border-radius:12px; flex-shrink:0;
        background:linear-gradient(135deg, var(--accent), var(--accent2));
        display:grid; place-items:center; font-weight:800; font-size:.95rem; color:#fff;
        box-shadow:0 8px 24px var(--accent-glow);
      }
      .brand h1 { margin:0; font-size:1.15rem; letter-spacing:-.02em; }
      .brand p { margin:.15rem 0 0; font-size:.82rem; color:var(--muted); }
      .topbar-meta { display:flex; align-items:center; gap:.65rem; flex-wrap:wrap; justify-content:flex-end; }
      .pill {
        display:inline-flex; align-items:center; gap:.45rem; padding:.45rem .75rem;
        border-radius:999px; font-size:.78rem; font-weight:600; border:1px solid var(--border);
        background:rgba(255,255,255,.03); color:var(--muted);
      }
      .pill strong { color:var(--text); }
      .pill.live { border-color:rgba(47,214,122,.35); background:var(--ok-bg); color:var(--ok); }
      .pill.live::before {
        content:""; width:8px; height:8px; border-radius:50%; background:var(--ok);
        box-shadow:0 0 0 0 rgba(47,214,122,.6); animation:pulse 1.6s infinite;
      }
      @keyframes pulse {
        0% { box-shadow:0 0 0 0 rgba(47,214,122,.55); }
        70% { box-shadow:0 0 0 10px rgba(47,214,122,0); }
        100% { box-shadow:0 0 0 0 rgba(47,214,122,0); }
      }
      .layout { display:grid; grid-template-columns:minmax(0,1.45fr) minmax(320px,.85fr); gap:1rem; align-items:start; }
      @media (max-width:1050px) { .layout { grid-template-columns:1fr; } }
      .card {
        background:rgba(21,29,46,.78); border:1px solid var(--border);
        border-radius:var(--radius); padding:1.1rem 1.15rem; box-shadow:var(--shadow);
        backdrop-filter:blur(10px);
      }
      .card + .card { margin-top:1rem; }
      .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:.75rem; margin-bottom:.85rem; }
      .card-head h2 { margin:0; font-size:1rem; letter-spacing:-.01em; }
      .card-head p { margin:.35rem 0 0; font-size:.8rem; color:var(--muted); line-height:1.45; }
      .section-label {
        margin:1rem 0 .55rem; font-size:.72rem; font-weight:700; letter-spacing:.08em;
        text-transform:uppercase; color:var(--dim);
      }
      .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.75rem; }
      button, .btn {
        appearance:none; border:1px solid transparent; border-radius:10px;
        padding:.55rem .9rem; font:inherit; font-size:.82rem; font-weight:600;
        cursor:pointer; transition:transform .15s ease, background .15s ease, border-color .15s ease, opacity .15s;
      }
      button:hover:not(:disabled) { transform:translateY(-1px); }
      button:disabled { opacity:.45; cursor:not-allowed; transform:none; }
      .btn-primary {
        color:#fff; background:linear-gradient(135deg, var(--accent), #4b79e8);
        box-shadow:0 10px 24px var(--accent-glow);
      }
      .btn-danger { color:#fff; background:linear-gradient(135deg, #ff6b7a, var(--err)); }
      .btn-ghost { color:var(--text); background:rgba(255,255,255,.04); border-color:var(--border); }
      .btn-ghost:hover:not(:disabled) { background:rgba(255,255,255,.07); border-color:var(--border-strong); }
      .btn-text { background:none; border:none; color:var(--accent); padding:.2rem .35rem; font-size:.75rem; }
      .routes {
        max-height:340px; overflow:auto; padding:.2rem;
        border:1px solid var(--border); border-radius:var(--radius-sm); background:rgba(8,11,18,.55);
      }
      .routes::-webkit-scrollbar { width:8px; }
      .routes::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:999px; }
      .route-group { padding:.65rem; border:1px solid var(--border); border-radius:12px; background:rgba(255,255,255,.02); }
      .route-group + .route-group { margin-top:.55rem; }
      .route-top { display:flex; align-items:center; justify-content:space-between; gap:.5rem; margin-bottom:.35rem; }
      .route-title { display:flex; align-items:center; gap:.5rem; min-width:0; }
      .ns-badge {
        font-size:.68rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
        color:#b9c9ff; background:rgba(91,140,255,.14); border:1px solid rgba(91,140,255,.22);
        padding:.18rem .45rem; border-radius:6px; flex-shrink:0;
      }
      .route-name { font-size:.88rem; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .route-meta { font-size:.74rem; color:var(--dim); margin-bottom:.5rem; }
      .endpoint-grid { display:grid; gap:.4rem; }
      .endpoint-tile {
        display:flex; align-items:center; gap:.65rem; padding:.55rem .65rem;
        border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,.02);
        cursor:pointer; transition:border-color .15s, background .15s, box-shadow .15s;
      }
      .endpoint-tile:hover { border-color:var(--border-strong); background:rgba(255,255,255,.04); }
      .endpoint-tile.selected {
        border-color:rgba(91,140,255,.55); background:rgba(91,140,255,.1);
        box-shadow:inset 0 0 0 1px rgba(91,140,255,.18);
      }
      .endpoint-tile input { position:absolute; opacity:0; pointer-events:none; }
      .endpoint-check {
        width:18px; height:18px; border-radius:6px; border:1px solid var(--border-strong);
        display:grid; place-items:center; flex-shrink:0; color:transparent; font-size:.72rem; font-weight:800;
        background:rgba(0,0,0,.2);
      }
      .endpoint-tile.selected .endpoint-check {
        color:#fff; border-color:transparent; background:linear-gradient(135deg, var(--accent), var(--accent2));
      }
      .endpoint-info { min-width:0; flex:1; }
      .endpoint-host { font-size:.8rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .endpoint-path {
        display:inline-block; margin-top:.15rem; font-size:.72rem; font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
        color:#9ec1ff; background:rgba(91,140,255,.12); border:1px solid rgba(91,140,255,.18);
        padding:.12rem .4rem; border-radius:6px;
      }
      .custom-paths-wrap { margin-top:.55rem; padding-top:.55rem; border-top:1px dashed var(--border); }
      .custom-paths-list { display:grid; gap:.4rem; margin-top:.4rem; }
      .custom-path-row {
        display:grid; grid-template-columns:1fr auto; gap:.45rem; align-items:end;
        padding:.45rem .55rem; border:1px solid var(--border); border-radius:10px; background:rgba(8,11,18,.35);
      }
      label { display:block; font-size:.74rem; font-weight:600; color:var(--muted); margin:0 0 .3rem; }
      input, select, textarea {
        width:100%; padding:.58rem .72rem; border-radius:10px; border:1px solid var(--border);
        background:rgba(8,11,18,.75); color:var(--text); font:inherit; font-size:.84rem;
        transition:border-color .15s, box-shadow .15s;
      }
      input:focus, select:focus, textarea:focus {
        outline:none; border-color:rgba(91,140,255,.55); box-shadow:0 0 0 3px rgba(91,140,255,.15);
      }
      textarea { min-height:4.5rem; resize:vertical; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:.78rem; }
      .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; }
      .config-actions { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; margin-top:1rem; }
      .config-actions button { width:100%; }
      .alert {
        margin-top:.85rem; padding:.65rem .8rem; border-radius:10px; font-size:.8rem; line-height:1.4;
        border:1px solid var(--border); background:rgba(255,255,255,.03); color:var(--muted); min-height:2.6rem;
      }
      .alert.warn { border-color:rgba(255,176,32,.35); background:var(--warn-bg); color:#ffd89a; }
      .alert.ok { border-color:rgba(47,214,122,.35); background:var(--ok-bg); color:#b7f5d2; }
      .metrics-wrap { margin-top:1rem; }
      .metrics {
        display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:.65rem;
      }
      .metric {
        position:relative; overflow:hidden; padding:.85rem .9rem; border-radius:12px;
        border:1px solid var(--border); background:rgba(8,11,18,.55);
      }
      .metric::before {
        content:""; position:absolute; left:0; right:0; top:0; height:3px;
        background:linear-gradient(90deg, var(--accent), var(--accent2));
        opacity:.85;
      }
      .metric.warn::before { background:linear-gradient(90deg, #ffb020, #ff7a45); }
      .metric.ok::before { background:linear-gradient(90deg, #2fd67a, #18b86f); }
      .metric span { display:block; font-size:.72rem; color:var(--muted); margin-bottom:.25rem; }
      .metric strong { font-size:1.2rem; letter-spacing:-.02em; }
      .metric small { display:block; margin-top:.2rem; font-size:.68rem; color:var(--dim); word-break:break-all; }
      .charts { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem; }
      @media (max-width:900px) { .charts { grid-template-columns:1fr; } }
      .chart-panel {
        border:1px solid var(--border); border-radius:12px; padding:.8rem .85rem .7rem;
        background:rgba(8,11,18,.55);
      }
      .chart-panel h3 { margin:0 0 .55rem; font-size:.82rem; color:var(--muted); font-weight:600; }
      canvas {
        width:100%; height:170px; display:block; border-radius:10px;
        background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
      }
      .empty { padding:1.2rem; text-align:center; color:var(--dim); font-size:.84rem; }
      .sticky { position:sticky; top:1rem; }
      body.testing .topbar { border-color:rgba(47,214,122,.25); }
    </style>
    </head>
    <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-icon">SA</div>
          <div>
            <h1>stress-app</h1>
            <p>HTTPRoute discovery &amp; in-cluster load testing</p>
          </div>
        </div>
        <div class="topbar-meta">
          <div class="pill" id="targetCountPill"><strong id="targetCount">0</strong> endpoints</div>
          <div class="pill" id="runPill" hidden>Test running</div>
        </div>
      </header>

      <div class="layout">
        <div class="main-col">
          <section class="card">
            <div class="card-head">
              <div>
                <h2>Test targets</h2>
                <p>Select endpoints from HTTPRoutes. Optionally add custom paths per route.</p>
              </div>
            </div>

            <div class="section-label">Discovered HTTPRoutes</div>
            <div class="toolbar">
              <button class="btn-ghost" id="refreshBtn" type="button">Refresh</button>
              <button class="btn-ghost" id="selectAllBtn" type="button">Select all</button>
              <button class="btn-ghost" id="clearBtn" type="button">Clear</button>
            </div>
            <div class="routes" id="routesList"><div class="empty">Loading routes...</div></div>
          </section>

          <section class="card metrics-wrap">
            <div class="card-head">
              <div>
                <h2>Live metrics</h2>
                <p>Throughput and latency from stress-app workers (not backend app metrics).</p>
              </div>
            </div>
            <div class="metrics" id="metrics"></div>
            <div class="charts">
              <div class="chart-panel">
                <h3>Throughput (req/s)</h3>
                <canvas id="throughputChart" width="800" height="170"></canvas>
              </div>
              <div class="chart-panel">
                <h3>Latency (avg ms)</h3>
                <canvas id="latencyChart" width="800" height="170"></canvas>
              </div>
            </div>
          </section>
        </div>

        <aside class="sticky">
          <section class="card">
            <div class="card-head">
              <div>
                <h2>Load profile</h2>
                <p>Configure concurrency, timing and request shape.</p>
              </div>
            </div>
            <div class="grid2">
              <div><label for="users">Concurrent users</label><input id="users" type="number" min="1" value="5"></div>
              <div><label for="duration">Duration (sec)</label><input id="duration" type="number" min="1" value="60"></div>
              <div><label for="rampUp">Ramp-up (sec)</label><input id="rampUp" type="number" min="0" value="10"></div>
              <div><label for="interval">Interval (ms)</label><input id="interval" type="number" min="0" value="0"></div>
            </div>
            <label for="method" style="margin-top:.65rem">HTTP method</label>
            <select id="method"><option>GET</option><option>POST</option></select>
            <label for="body">POST body</label>
            <textarea id="body" placeholder='{"key":"value"}'></textarea>
            <label for="headers">Extra headers (JSON)</label>
            <textarea id="headers" placeholder='{"X-Test":"1"}'></textarea>
            <div class="config-actions">
              <button class="btn-primary" id="startBtn" type="button">Start test</button>
              <button class="btn-danger" id="stopBtn" type="button" disabled>Stop</button>
            </div>
            <div class="alert" id="statusMsg">Ready.</div>
          </section>
        </aside>
      </div>
    </div>
    <script>
    let routes = [];
    let pollTimer = null;

    function el(id) { return document.getElementById(id); }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
    }

    function setStatus(msg, kind) {
      const box = el('statusMsg');
      box.textContent = msg;
      box.className = 'alert' + (kind ? ' ' + kind : '');
    }

    function setRunning(active) {
      document.body.classList.toggle('testing', active);
      el('runPill').hidden = !active;
      if (active) el('runPill').className = 'pill live';
    }

    function updateTargetCount() {
      const n = selectedTargets().length;
      el('targetCount').textContent = n;
    }

    function bindEndpointTiles() {
      document.querySelectorAll('.endpoint-tile').forEach(function(tile) {
        const cb = tile.querySelector('.endpoint-cb');
        function sync() { tile.classList.toggle('selected', cb.checked); updateTargetCount(); }
        tile.onclick = function(e) {
          if (e.target.tagName === 'A') return;
          cb.checked = !cb.checked;
          sync();
        };
        cb.addEventListener('change', sync);
        sync();
      });
    }

    function routeHostnames(route) {
      const hosts = route.hostnames || [];
      if (hosts.length) return hosts.filter(function(h) { return h && h !== '*'; });
      const fromTargets = (route.targets || []).map(function(t) { return t.hostname; });
      return fromTargets.filter(function(h, i, a) { return h && h !== '*' && a.indexOf(h) === i; });
    }

    function addCustomPathRow(routeGroup, path) {
      const list = routeGroup.querySelector('.custom-paths-list');
      const row = document.createElement('div');
      row.className = 'custom-path-row';
      row.innerHTML =
        '<div><label>Custom path</label><input class="ce-path" value="' + esc(path || '/') + '" placeholder="/api/health"></div>' +
        '<button type="button" class="btn-danger remove-row">Remove</button>';
      row.querySelector('.remove-row').onclick = function() { row.remove(); updateTargetCount(); };
      row.querySelector('.ce-path').addEventListener('input', updateTargetCount);
      list.appendChild(row);
      updateTargetCount();
    }

    async function fetchRoutes() {
      el('routesList').innerHTML = '<div class="empty">Loading routes...</div>';
      try {
        const res = await fetch('/api/routes');
        const data = await res.json();
        routes = data.routes || [];
        renderRoutes();
        updateTargetCount();
      } catch (e) {
        el('routesList').innerHTML = '<div class="empty warn">Failed to load routes: ' + esc(e) + '</div>';
      }
    }

    function renderRoutes() {
      if (!routes.length) {
        el('routesList').innerHTML = '<div class="empty">No HTTPRoutes found in the cluster.</div>';
        return;
      }
      el('routesList').innerHTML = routes.map(function(r) {
        const parts = (r.id || '').split('/');
        const ns = parts[0] || r.namespace;
        const name = parts[1] || r.name;
        const gwUrl = r.gateway_url || ((r.targets && r.targets[0]) ? r.targets[0].gateway_url : '');
        const hosts = routeHostnames(r);
        const hostsLabel = hosts.length ? hosts.join(', ') : '(no hostname)';
        const endpointRows = (r.targets || []).map(function(t) {
          return '<label class="endpoint-tile">' +
            '<input type="checkbox" class="endpoint-cb" data-hostname="' + esc(t.hostname) + '" data-path="' + esc(t.path) + '" data-gateway="' + esc(t.gateway_url) + '" value="' + esc(t.id) + '">' +
            '<span class="endpoint-check">&#10003;</span>' +
            '<span class="endpoint-info"><span class="endpoint-host">' + esc(t.hostname) + '</span><br><span class="endpoint-path">' + esc(t.path) + '</span></span>' +
            '</label>';
        }).join('');
        return '<div class="route-group" data-route-id="' + esc(r.id) + '" data-gateway-url="' + esc(gwUrl) + '" data-hostnames="' + esc(JSON.stringify(hosts)) + '">' +
          '<div class="route-top">' +
            '<div class="route-title"><span class="ns-badge">' + esc(ns) + '</span><span class="route-name">' + esc(name) + '</span></div>' +
            '<button type="button" class="btn-text route-select-all">Select all</button>' +
          '</div>' +
          '<div class="route-meta">Hostnames: ' + esc(hostsLabel) + '</div>' +
          '<div class="endpoint-grid">' + endpointRows + '</div>' +
          '<div class="custom-paths-wrap">' +
            '<button type="button" class="btn-text add-custom-path">+ Add custom path</button>' +
            '<div class="custom-paths-list"></div>' +
          '</div>' +
          '</div>';
      }).join('');

      bindEndpointTiles();
      document.querySelectorAll('.route-select-all').forEach(function(btn) {
        btn.onclick = function() {
          const group = btn.closest('.route-group');
          group.querySelectorAll('.endpoint-cb').forEach(function(cb) { cb.checked = true; });
          bindEndpointTiles();
          updateTargetCount();
        };
      });
      document.querySelectorAll('.add-custom-path').forEach(function(btn) {
        btn.onclick = function() {
          addCustomPathRow(btn.closest('.route-group'), '/');
        };
      });
    }

    function selectedTargets() {
      const targets = [];
      document.querySelectorAll('.endpoint-cb:checked').forEach(function(cb) {
        targets.push({ hostname: cb.dataset.hostname, path: cb.dataset.path, gateway_url: cb.dataset.gateway });
      });
      document.querySelectorAll('.route-group').forEach(function(group) {
        const gateway = group.dataset.gatewayUrl;
        let hostnames = [];
        try { hostnames = JSON.parse(group.dataset.hostnames || '[]'); } catch (e) { hostnames = []; }
        if (!gateway || !hostnames.length) return;
        group.querySelectorAll('.custom-path-row').forEach(function(row) {
          const rawPath = row.querySelector('.ce-path').value.trim() || '/';
          const path = rawPath.startsWith('/') ? rawPath : '/' + rawPath;
          hostnames.forEach(function(hostname) {
            targets.push({ hostname: hostname, path: path, gateway_url: gateway });
          });
        });
      });
      return targets;
    }

    function parseJsonField(raw, fallback) {
      if (!raw.trim()) return fallback;
      return JSON.parse(raw);
    }

    async function startTest() {
      const targets = selectedTargets();
      if (!targets.length) { setStatus('Select or add at least one endpoint.', 'warn'); return; }
      let headers = {};
      try { headers = parseJsonField(el('headers').value, {}); }
      catch (e) { setStatus('Invalid headers JSON.', 'warn'); return; }
      const payload = {
        targets: targets,
        concurrent_users: +el('users').value,
        duration_sec: +el('duration').value,
        ramp_up_sec: +el('rampUp').value,
        interval_ms: +el('interval').value,
        method: el('method').value,
        body: el('body').value,
        headers: headers
      };
      setStatus('Starting test against ' + targets.length + ' endpoint(s)...', '');
      const res = await fetch('/api/test/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) { setStatus(data.error || 'Start failed', 'warn'); return; }
      setRunning(true);
      setStatus('Test running against ' + targets.length + ' endpoint(s).', 'ok');
      el('startBtn').disabled = true;
      el('stopBtn').disabled = false;
      if (!pollTimer) pollTimer = setInterval(pollStatus, 1000);
    }

    async function stopTest() {
      await fetch('/api/test/stop', { method:'POST' });
      setStatus('Stopping test...', '');
    }

    function renderMetrics(m) {
      const errPct = (m.error_rate * 100).toFixed(2);
      const items = [
        { label:'Total requests', value:m.total_requests, cls:'' },
        { label:'Throughput', value:m.requests_per_sec + ' req/s', cls:'ok' },
        { label:'Avg latency', value:m.latency_avg_ms + ' ms', cls:'' },
        { label:'Min / Max', value:m.latency_min_ms + ' / ' + m.latency_max_ms + ' ms', cls:'' },
        { label:'Error rate', value:errPct + '%', cls: parseFloat(errPct) > 0 ? 'warn' : 'ok' },
        { label:'Elapsed', value:m.elapsed_sec + ' s', cls:'' },
        { label:'Status codes', value:'', codes: m.status_codes || {}, cls:'' }
      ];
      el('metrics').innerHTML = items.map(function(it) {
        if (it.codes) {
          const codes = Object.keys(it.codes).length
            ? Object.entries(it.codes).map(function(e) { return e[0] + ': ' + e[1]; }).join(' · ')
            : '—';
          return '<div class="metric ' + it.cls + '"><span>' + it.label + '</span><strong>—</strong><small>' + esc(codes) + '</small></div>';
        }
        return '<div class="metric ' + it.cls + '"><span>' + it.label + '</span><strong>' + esc(it.value) + '</strong></div>';
      }).join('');
      drawChart('throughputChart', m.throughput_history || [], 'rps', ['#5b8cff', '#7c5cff']);
      drawChart('latencyChart', m.latency_history || [], 'avg_ms', ['#2fd67a', '#18b86f']);
    }

    function drawChart(canvasId, data, key, colors) {
      const canvas = el(canvasId);
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const w = rect.width, h = rect.height;
      const pad = { l:42, r:12, t:14, b:24 };
      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (h - pad.t - pad.b) * (i / 4);
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, h - pad.b); ctx.lineTo(w - pad.r, h - pad.b); ctx.stroke();

      if (!data.length) {
        ctx.fillStyle = '#5c6f88';
        ctx.font = '12px sans-serif';
        ctx.fillText('Waiting for data...', pad.l + 8, h / 2);
        return;
      }

      const vals = data.map(function(d) { return d[key]; });
      const maxV = Math.max.apply(null, vals.concat([1]));
      const plotW = w - pad.l - pad.r;
      const plotH = h - pad.t - pad.b;
      const xs = data.length > 1 ? plotW / (data.length - 1) : 0;
      const points = data.map(function(d, i) {
        return { x: pad.l + i * xs, y: h - pad.b - (d[key] / maxV) * plotH };
      });

      const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
      grad.addColorStop(0, colors[0] + '55');
      grad.addColorStop(1, colors[0] + '05');
      ctx.beginPath();
      points.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.lineTo(points[points.length - 1].x, h - pad.b);
      ctx.lineTo(points[0].x, h - pad.b);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = colors[0];
      ctx.lineWidth = 2;
      ctx.beginPath();
      points.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.stroke();
    }

    async function pollStatus() {
      const res = await fetch('/api/test/status');
      const m = await res.json();
      renderMetrics(m);
      if (!m.running) {
        setRunning(false);
        el('startBtn').disabled = false;
        el('stopBtn').disabled = true;
        setStatus(m.done ? 'Test finished.' : 'Test stopped.', m.done ? 'ok' : '');
        clearInterval(pollTimer); pollTimer = null;
      }
    }

    el('refreshBtn').onclick = fetchRoutes;
    el('selectAllBtn').onclick = function() {
      document.querySelectorAll('.endpoint-cb').forEach(function(c) { c.checked = true; });
      bindEndpointTiles();
      updateTargetCount();
    };
    el('clearBtn').onclick = function() {
      document.querySelectorAll('.endpoint-cb').forEach(function(c) { c.checked = false; });
      bindEndpointTiles();
      updateTargetCount();
    };
    el('startBtn').onclick = startTest;
    el('stopBtn').onclick = stopTest;
    fetchRoutes();
    renderMetrics({ total_requests:0, requests_per_sec:0, latency_avg_ms:0, latency_min_ms:0, latency_max_ms:0, error_rate:0, elapsed_sec:0, status_codes:{}, throughput_history:[], latency_history:[] });
    </script>
    </body>
    </html>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stress-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "35"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stress-app-httproute-reader
  annotations:
    argocd.argoproj.io/sync-wave: "35"
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stress-app-httproute-reader
  annotations:
    argocd.argoproj.io/sync-wave: "35"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stress-app-httproute-reader
subjects:
  - kind: ServiceAccount
    name: stress-app
    namespace: example-apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-app
  namespace: example-apps
  labels:
    app: stress-app
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-app
  template:
    metadata:
      labels:
        app: stress-app
    spec:
      serviceAccountName: stress-app
      containers:
        - name: stress-app
          image: docker.io/library/python:3-alpine
          command:
            - python3
            - /app/app.py
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: code
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 512Mi
      volumes:
        - name: code
          configMap:
            name: stress-app
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: stress-app
  namespace: example-apps
  labels:
    app: stress-app
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  selector:
    app: stress-app
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: stress-app
  namespace: example-apps
  labels:
    app: stress-app
  annotations:
    argocd.argoproj.io/sync-wave: "36"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  to:
    kind: Service
    name: stress-app
    weight: 100
  port:
    targetPort: http
