---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: external-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "26"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hosts:
    - httpbin.org
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: external-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "26"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: httpbin.org
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: httpbin.org
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
  hostnames:
    - external-app.{{ .Values.baseDns }}
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: httpbin.org
      backendRefs:
        - group: networking.istio.io
          kind: Hostname
          name: httpbin.org
          port: 443
