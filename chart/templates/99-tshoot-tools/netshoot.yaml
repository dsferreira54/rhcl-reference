apiVersion: v1
kind: Namespace
metadata:
  name: troubleshooting
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    argocd.argoproj.io/sync-wave: "32"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netshoot-sa
  namespace: troubleshooting
  annotations:
    argocd.argoproj.io/sync-wave: "33"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netshoot-sa-privileged-scc
  namespace: troubleshooting
  annotations:
    argocd.argoproj.io/sync-wave: "34"
subjects:
  - kind: ServiceAccount
    name: netshoot-sa
    namespace: troubleshooting
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
---
apiVersion: v1
kind: Service
metadata:
  name: netshoot
  namespace: troubleshooting
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  clusterIP: None
  selector:
    app: netshoot
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: netshoot
  namespace: troubleshooting
  annotations:
    argocd.argoproj.io/sync-wave: "36"
spec:
  serviceName: netshoot
  replicas: 1
  selector:
    matchLabels:
      app: netshoot
  template:
    metadata:
      labels:
        app: netshoot
    spec:
      serviceAccountName: netshoot-sa
      restartPolicy: Always
      containers:
        - name: netshoot
          image: nicolaka/netshoot:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              trap : TERM INT
              sleep infinity & wait
          stdin: true
          tty: true
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true