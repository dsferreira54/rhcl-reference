    #!/usr/bin/env python3
    """stress-app: HTTP load tester with Kubernetes HTTPRoute discovery."""
    import json
    import random
    import ssl
    import threading
    import time
    import urllib.error
    import urllib.request
    from collections import defaultdict
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from urllib.parse import urlparse

    PORT = 8080
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    API = "https://kubernetes.default.svc"
    HTML_PATH = Path("/app/index.html")
    GATEWAY_CACHE = {}
    GATEWAY_CACHE_LOCK = threading.Lock()

    current_test = None
    test_lock = threading.Lock()


    def k8s_request(path):
        with open(TOKEN_PATH) as f:
            token = f.read().strip()
        ctx = ssl.create_default_context(cafile=CA_PATH)
        req = urllib.request.Request(
            API + path,
            headers={"Authorization": "Bearer " + token, "Accept": "application/json"},
        )
        with urllib.request.urlopen(req, context=ctx, timeout=15) as resp:
            return json.loads(resp.read().decode())


    def gateway_base_url(gw_ns, gw_name):
        key = f"{gw_ns}/{gw_name}"
        with GATEWAY_CACHE_LOCK:
            if key in GATEWAY_CACHE:
                return GATEWAY_CACHE[key]
        data = k8s_request(f"/api/v1/namespaces/{gw_ns}/services")
        base = None
        for svc in data.get("items", []):
            labels = svc.get("metadata", {}).get("labels", {}) or {}
            if labels.get("gateway.networking.k8s.io/gateway-name") == gw_name:
                port = 80
                for p in svc.get("spec", {}).get("ports", []):
                    if p.get("port") == 80 or p.get("name") in ("http", "http-80"):
                        port = p["port"]
                        break
                name = svc["metadata"]["name"]
                base = f"http://{name}.{gw_ns}.svc.cluster.local:{port}"
                break
        if not base:
            base = f"http://{gw_name}.{gw_ns}.svc.cluster.local:80"
        with GATEWAY_CACHE_LOCK:
            GATEWAY_CACHE[key] = base
        return base


    def extract_paths(rule):
        paths = []
        for match in rule.get("matches", []) or []:
            p = match.get("path", {})
            if p.get("value"):
                paths.append(p["value"])
        return paths or ["/"]


    def discover_routes():
        data = k8s_request("/apis/gateway.networking.k8s.io/v1/httproutes")
        routes = []
        for item in data.get("items", []):
            meta = item.get("metadata", {})
            spec = item.get("spec", {}) or {}
            ns = meta.get("namespace", "default")
            name = meta.get("name", "")
            hostnames = spec.get("hostnames") or []
            parent_refs = spec.get("parentRefs") or [{}]
            parent = parent_refs[0]
            gw_ns = parent.get("namespace") or ns
            gw_name = parent.get("name") or "main-gateway"
            try:
                gw_url = gateway_base_url(gw_ns, gw_name)
            except Exception:
                gw_url = f"http://{gw_name}.{gw_ns}.svc.cluster.local:80"

            all_paths = []
            for rule in spec.get("rules", []) or []:
                all_paths.extend(extract_paths(rule))
            if not all_paths:
                all_paths = ["/"]

            targets = []
            for hostname in hostnames or ["*"]:
                for path in all_paths:
                    targets.append(
                        {
                            "id": f"{ns}/{name}|{hostname}|{path}",
                            "hostname": hostname,
                            "path": path,
                            "gateway_url": gw_url,
                        }
                    )

                routes.append(
                    {
                        "id": f"{ns}/{name}",
                        "namespace": ns,
                        "name": name,
                        "hostnames": hostnames,
                        "paths": sorted(set(all_paths)),
                        "gateway": f"{gw_ns}/{gw_name}",
                        "gateway_url": gw_url,
                        "targets": targets,
                    }
                )
            routes.sort(key=lambda r: (r["namespace"], r["name"]))
            return routes


        def normalize_targets(targets):
            normalized = []
            for t in targets or []:
                hostname = (t.get("hostname") or "").strip()
                path = (t.get("path") or "/").strip() or "/"
                if not path.startswith("/"):
                    path = "/" + path
                gateway_url = (t.get("gateway_url") or "").strip()
                if hostname and gateway_url:
                    normalized.append(
                        {"hostname": hostname, "path": path, "gateway_url": gateway_url}
                    )
            return normalized


    class LoadTest:
        def __init__(self, config):
            self.config = config
            self.running = False
            self.done = False
            self.lock = threading.Lock()
            self.start_time = None
            self.total = 0
            self.errors = 0
            self.latencies = []
            self.status_codes = defaultdict(int)
            self.throughput_history = []
            self.latency_history = []
            self._threads = []
            self._collector = None
            self._window_count = 0

        def snapshot(self):
            with self.lock:
                elapsed = max(time.time() - self.start_time, 0.001) if self.start_time else 0
                lats = list(self.latencies)
                avg = sum(lats) / len(lats) if lats else 0
                rps = self.total / elapsed if elapsed else 0
                err_rate = (self.errors / self.total) if self.total else 0
                return {
                    "running": self.running,
                    "done": self.done,
                    "elapsed_sec": round(elapsed, 2),
                    "total_requests": self.total,
                    "requests_per_sec": round(rps, 2),
                    "latency_avg_ms": round(avg, 2),
                    "latency_min_ms": round(min(lats), 2) if lats else 0,
                    "latency_max_ms": round(max(lats), 2) if lats else 0,
                    "error_rate": round(err_rate, 4),
                    "status_codes": dict(self.status_codes),
                    "throughput_history": list(self.throughput_history),
                    "latency_history": list(self.latency_history),
                }

        def start(self):
            self.running = True
            self.start_time = time.time()
            users = max(1, int(self.config.get("concurrent_users", 1)))
            ramp = max(0, float(self.config.get("ramp_up_sec", 0)))
            stagger = ramp / users if users else 0
            self._collector = threading.Thread(target=self._collect_metrics, daemon=True)
            self._collector.start()
            for i in range(users):
                t = threading.Thread(target=self._worker, args=(i * stagger,), daemon=True)
                self._threads.append(t)
                t.start()
            threading.Thread(target=self._watch_duration, daemon=True).start()

        def stop(self):
            self.running = False

        def _watch_duration(self):
            duration = float(self.config.get("duration_sec", 60))
            time.sleep(duration)
            self.running = False
            for t in self._threads:
                t.join(timeout=5)
            self.done = True

        def _collect_metrics(self):
            while self.running or not self.done:
                time.sleep(1)
                with self.lock:
                    if not self.start_time:
                        continue
                    elapsed = time.time() - self.start_time
                    count = self._window_count
                    self._window_count = 0
                    lats = list(self.latencies[-count:]) if count else []
                    rps = count
                    avg = sum(lats) / len(lats) if lats else 0
                    self.throughput_history.append({"t": round(elapsed, 1), "rps": rps})
                    self.latency_history.append({"t": round(elapsed, 1), "avg_ms": round(avg, 2)})
                    if len(self.throughput_history) > 300:
                        self.throughput_history = self.throughput_history[-300:]
                        self.latency_history = self.latency_history[-300:]
                if self.done:
                    break

        def _worker(self, delay):
            time.sleep(delay)
            targets = self.config.get("targets") or []
            if not targets:
                return
            method = (self.config.get("method") or "GET").upper()
            body = self.config.get("body") or ""
            body_bytes = body.encode() if body else None
            extra_headers = self.config.get("headers") or {}
            interval = max(0, float(self.config.get("interval_ms", 0))) / 1000.0
            duration = float(self.config.get("duration_sec", 60))

            while self.running:
                if time.time() - self.start_time >= duration:
                    break
                target = random.choice(targets)
                hostname = target["hostname"]
                path = target.get("path") or "/"
                if not path.startswith("/"):
                    path = "/" + path
                url = target["gateway_url"].rstrip("/") + path
                headers = {"Host": hostname, "User-Agent": "stress-app/1.0"}
                headers.update(extra_headers)
                if body_bytes and method in ("POST", "PUT", "PATCH"):
                    headers.setdefault("Content-Type", "application/json")
                req = urllib.request.Request(
                    url,
                    data=body_bytes if method != "GET" else None,
                    headers=headers,
                    method=method,
                )
                start = time.time()
                status = 0
                error = False
                try:
                    with urllib.request.urlopen(req, timeout=30) as resp:
                        status = resp.status
                except urllib.error.HTTPError as e:
                    status = e.code
                except Exception:
                    error = True
                latency_ms = (time.time() - start) * 1000
                with self.lock:
                    self.total += 1
                    self._window_count += 1
                    if error or status >= 400:
                        self.errors += 1
                    if status:
                        self.status_codes[str(status)] += 1
                    else:
                        self.status_codes["error"] += 1
                    self.latencies.append(latency_ms)
                    if len(self.latencies) > 50000:
                        self.latencies = self.latencies[-25000:]
                if interval > 0:
                    time.sleep(interval)


    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            pass

        def _json_response(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _read_body(self):
            length = int(self.headers.get("Content-Length", 0))
            if length:
                return self.rfile.read(length)
            return b""

        def do_GET(self):
            path = urlparse(self.path).path
            if path in ("/", "/index.html"):
                body = HTML_PATH.read_bytes()
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return
            if path == "/health":
                self._json_response(200, {"status": "ok"})
                return
                if path == "/api/routes":
                    try:
                        routes = discover_routes()
                        self._json_response(200, {"routes": routes})
                    except Exception as exc:
                        self._json_response(500, {"error": str(exc), "routes": []})
                    return
            if path == "/api/test/status":
                global current_test
                with test_lock:
                    test = current_test
                if test:
                    self._json_response(200, test.snapshot())
                else:
                    self._json_response(
                        200,
                        {
                            "running": False,
                            "done": False,
                            "total_requests": 0,
                            "requests_per_sec": 0,
                            "latency_avg_ms": 0,
                            "latency_min_ms": 0,
                            "latency_max_ms": 0,
                            "error_rate": 0,
                            "status_codes": {},
                            "throughput_history": [],
                            "latency_history": [],
                            "elapsed_sec": 0,
                        },
                    )
                return
            self.send_error(404)

        def do_POST(self):
            global current_test
            path = urlparse(self.path).path
            if path == "/api/test/start":
                try:
                    config = json.loads(self._read_body().decode() or "{}")
                except json.JSONDecodeError:
                    self._json_response(400, {"error": "invalid JSON"})
                    return
                targets = normalize_targets(config.get("targets"))
                if not targets:
                    self._json_response(400, {"error": "no targets selected"})
                    return
                config["targets"] = targets
                with test_lock:
                    if current_test and current_test.running:
                        self._json_response(409, {"error": "test already running"})
                        return
                    current_test = LoadTest(config)
                    current_test.start()
                self._json_response(200, {"status": "started"})
                return
            if path == "/api/test/stop":
                with test_lock:
                    if current_test:
                        current_test.stop()
                self._json_response(200, {"status": "stopping"})
                return
            self.send_error(404)


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PORT), Handler)
        print(f"stress-app listening on :{PORT}", flush=True)
        server.serve_forever()
