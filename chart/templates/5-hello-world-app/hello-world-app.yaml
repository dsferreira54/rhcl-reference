---
apiVersion: v1
kind: Namespace
metadata:
  name: poc-rhcl-hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "9"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app
  namespace: poc-rhcl-hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world-app
  template:
    metadata:
      labels:
        app: hello-world-app
    spec:
      containers:
      - name: hello-world-app-container
        image: docker.io/testcontainers/helloworld
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-app
  namespace: poc-rhcl-hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  selector:
    app: hello-world-app
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-app
  namespace: poc-rhcl-hello-world-app
  labels:
    app: hello-world-app
    deployment: hello-world-app
    service: hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  parentRefs:
  - name: main-gateway
    namespace: openshift-ingress
  hostnames:
  - hello-world-app.{{ .Values.baseDns }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: hello-world-app
      port: 8080
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: hello-world-app
  namespace: poc-rhcl-hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  limits:
    my-limits:
      rates:
        - limit: 5000
          window: 10s
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hello-world-app