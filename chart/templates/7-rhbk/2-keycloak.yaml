---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-admin
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "39"
type: Opaque
stringData:
  username: admin
  password: redhat
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: rhcl
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "39"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  bootstrapAdmin:
    user:
      secret: keycloak-bootstrap-admin
  db:
    vendor: postgres
    host: postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  hostname:
    hostname: https://keycloak.apps.cluster-65z4x.dynamic2.redhatworkshops.io
  http:
    httpEnabled: true
