---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "23"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world-app
  template:
    metadata:
      labels:
        app: hello-world-app
    spec:
      containers:
      - name: hello-world-app-container
        image: docker.io/testcontainers/helloworld
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "23"
spec:
  selector:
    app: hello-world-app
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-app
  namespace: example-apps
  labels:
    name: hello-world-app
    app: hello-world-app
    deployment: hello-world-app
    service: hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "24"
spec:
  parentRefs:
  - name: main-gateway
    namespace: istio-ingress
  hostnames:
  - hello-world-app.{{ .Values.baseDns }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: hello-world-app
      port: 8080
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: hello-world-app
  namespace: example-apps
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  limits:
    my-limits:
      rates:
        - limit: 5
          window: 10s
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hello-world-app
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: hello-world-ext-authz
  namespace: istio-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "31"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main-gateway
  action: CUSTOM
  provider:
    name: request-interceptor-provider
  rules:
    - to:
        - operation:
            hosts:
              - hello-world-app.{{ .Values.baseDns }}
