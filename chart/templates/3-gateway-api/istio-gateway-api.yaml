---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-ingress
  labels:
    istio.io/rev: default
    openshift.io/cluster-monitoring: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "11"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: istio-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: istio
  listeners:
  {{- if .Values.helloWorldApp.oidc.enabled }}
  # OIDCPolicy cannot use a wildcard listener — it derives cookie Domain and
  # post-login redirect from the gateway hostname (Kuadrant #1504).
  - name: hello-world-app
    hostname: "hello-world-app.{{ .Values.baseDns }}"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: external-app
    hostname: "external-app.{{ .Values.baseDns }}"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  {{- else }}
  - name: http
    hostname: "*.{{ .Values.baseDns }}"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  {{- end }}
