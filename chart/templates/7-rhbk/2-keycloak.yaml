---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-admin
  namespace: rhbk
  annotations:
    argocd.argoproj.io/sync-wave: "39"
type: Opaque
stringData:
  username: admin
  password: redhat
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: rhbk
  annotations:
    argocd.argoproj.io/sync-wave: "39"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  bootstrapAdmin:
    user:
      secret: keycloak-bootstrap-admin
  db:
    vendor: postgres
    host: postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  hostname:
    hostname: https://keycloak.apps.cluster-lx4g9.dynamic2.redhatworkshops.io
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded
  ingress:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1700Mi
